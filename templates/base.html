{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>SOTECH - {% block titulo %}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style/global.css' %}?{% now 'U' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="{% static 'imgs/favicon.ico' %}">
    {% block estilo %}{% endblock %}
</head>

<body>
    <div class="wrapper">
        {% include 'barra_lateral.html' %}
        <script>
            const ele=document.getElementById("{% block selecao %}{% endblock %}");
            ele.classList.add('active');
        </script>
        {% block conteudo %}{% endblock %}
    </div>
    {% block extra %}{% endblock %}
</body>

</html>
